<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg"> <defs> <!-- Glow filter --> <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"> <feGaussianBlur stdDeviation="2" result="blur"/> <feMerge> <feMergeNode in="blur"/> <feMergeNode in="SourceGraphic"/> </feMerge> </filter> <!-- Grid pattern --> <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"> <path d="M40 0H0V40" fill="none" stroke="#00FF41" stroke-width="0.3" opacity="0.1"/> </pattern> <!-- Scanline pattern --> <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"> <path d="M0 1 H4" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.08"/> </pattern> </defs> <!-- Background --> <rect width="1200" height="180" fill="#0D1117"/> <rect width="1200" height="180" fill="url(#grid)"/> <!-- Terminal window --> <rect x="5" y="5" width="1190" height="170" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.5"/> <!-- Top bar buttons --> <g transform="translate(20,20)"> <circle cx="5" cy="5" r="5" fill="#FF5F56"/> <circle cx="25" cy="5" r="5" fill="#FFBD2E"/> <circle cx="45" cy="5" r="5" fill="#27C93F"/> </g> <!-- Bash line --> <text x="600" y="30" font-family="monospace" font-size="12" fill="#C9D1D9" text-anchor="middle"> bash -- ~ </text> <!-- Main prompt with cursor --> <text x="30" y="70" font-family="monospace" font-size="16" fill="#00FF41" filter="url(#glow)"> <tspan fill="#A5D6FF">[chridamico@github]</tspan> <tspan> <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>| </tspan> </text> <!-- Terminal logs (left side) --> <g transform="translate(30,100)" font-family="monospace" font-size="14"> <text y="0" fill="#C9D1D9">> Loading profile...</text> <text y="20" fill="#C9D1D9">> Access granted <tspan fill="#00FF41">✔</tspan></text> <text y="40" fill="#C9D1D9">> Initializing repositories...</text> <text y="60" fill="#C9D1D9">> Ready for development 💻</text> </g> <!-- Metrics panel (right side, compact, aligned vertically) --> <g transform="translate(700,100)" font-family="monospace" font-size="14"> <!-- Background panel --> <rect x="0" y="0" width="470" height="140" rx="5" fill="#0D1117" stroke="#30363D" stroke-width="1"/> <!-- Panel title --> <text x="10" y="15" fill="#A5D6FF" font-size="12">&gt; GitHub Metrics:</text> <!-- Horizontal bars --> <g transform="translate(10,25)"> <text y="10" fill="#C9D1D9" font-size="12">📦 Repos</text> <rect x="60" y="2" width="140" height="10" rx="2" fill="#00FFAA"/> <text y="30" fill="#C9D1D9" font-size="12">👥 Followers</text> <rect x="60" y="22" width="110" height="10" rx="2" fill="#00CFFF"/> <text y="50" fill="#C9D1D9" font-size="12">⭐ Stars</text> <rect x="60" y="42" width="130" height="10" rx="2" fill="#FF5FBA"/> </g> <!-- Mini pie charts (stacked, non-overlapping) --> <g transform="translate(300,25)"> <text x="0" y="10" fill="#C9D1D9" font-size="12">💾 Commits</text> <circle cx="20" cy="25" r="15" fill="none" stroke="#FFBD2E" stroke-width="10" stroke-dasharray="80 94"/> <text x="50" y="10" fill="#C9D1D9" font-size="12">📁 Projects</text> <circle cx="70" cy="25" r="15" fill="none" stroke="#27FF57" stroke-width="10" stroke-dasharray="60 114"/> </g> </g> <!-- Scanline animation --> <rect x="0" y="-180" width="1200" height="180" fill="rgba(0,255,65,0.06)"> <animate attributeName="y" from="-180" to="180" dur="3s" repeatCount="indefinite"/> </rect> <!-- Static scanline overlay --> <rect x="5" y="5" width="1190" height="170" fill="url(#scanlines)" pointer-events="none"/> </svg>
