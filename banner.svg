<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#00FF41" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 1 H4" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="180" fill="#0D1117"/>
  <rect width="1200" height="180" fill="url(#grid)"/>

  <rect x="5" y="5" width="1190" height="170" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <rect x="5" y="5" width="1190" height="170" rx="10" fill="url(#scanlines)" pointer-events="none"/>

  <rect x="6" y="6" width="1188" height="30" rx="8" fill="#30363D" fill-opacity="0.5"/>
  <g transform="translate(20,15)">
    <circle cx="5" cy="5" r="5" fill="#FF5F56"/>
    <circle cx="25" cy="5" r="5" fill="#FFBD2E"/>
    <circle cx="45" cy="5" r="5" fill="#27C93F"/>
  </g>
  <text x="600" y="26" font-family="monospace" font-size="12" fill="#C9D1D9" text-anchor="middle">
    bash -- chridamico@github
  </text>

  <text x="30" y="55" font-family="monospace" font-size="16" fill="#C9D1D9">
    <tspan fill="#A5D6FF">[chridamico@github]</tspan>
    <tspan> ~ $ </tspan>
    <tspan>./fetch-stats.sh</tspan>
    <tspan fill="#00FF41" dx="5" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>|
    </tspan>
  </text>
  
  <g font-family="monospace" font-size="14">
    <style>
      .log-line { opacity: 0; animation-fill-mode: forwards; }
      #dashboard-group { opacity: 0; animation: fadeIn 0.5s 3.8s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
    </style>
    
    <g id="log-group" transform="translate(30, 80)" fill="#C9D1D9">
      <text y="0" class="log-line" style="animation: fadeIn 0.5s 0.5s forwards;">&gt; Loading profile...</text>
      <text y="20" class="log-line" style="animation: fadeIn 0.5s 1.5s forwards;">&gt; Access granted <tspan fill="#00FF41">✔</tspan></text>
      <text y="40" class="log-line" style="animation: fadeIn 0.5s 2.5s forwards;">&gt; Fetching repository data...</text>
      <text y="60" class="log-line" style="animation: fadeIn 0.5s 3.5s forwards;">&gt; Displaying metrics.</text>
    </g>

    <g id="dashboard-group" transform="translate(600, 70)">
      <rect x="0" y="0" width="570" height="100" rx="8" fill="#0D1117" stroke="#30363D"/>
      
      <text x="15" y="20" fill="#A5D6FF" font-size="13" font-weight="bold">&gt; GitHub Metrics</text>

      <g transform="translate(15, 30)" font-size="14">
        <text y="15" fill="#00FF41" font-weight="bold">📦 Repos</text>
        <rect x="120" y="8" width="180" height="10" rx="3" fill="#00FFAA"/>
        
        <text y="35" fill="#00FF41" font-weight="bold">⭐ Stars</text>
        <rect x="120" y="28" width="240" height="10" rx="3" fill="#FFBD2E"/>
        
        <text y="55" fill="#00FF41" font-weight="bold">👥 Followers</text>
        <rect x="120" y="48" width="150" height="10" rx="3" fill="#00CFFF"/>
        
        <text y="75" fill="#00FF41" font-weight="bold">💾 Commits</text>
        <rect x="120" y="68" width="280" height="10" rx="3" fill="#FF5FBA"/>
      </g>
    </g>
  </g>
</svg>
