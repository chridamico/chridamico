<svg width="100%" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="180" fill="#000000" />

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#00FF41" stroke-width="0.3" opacity="0.2" />
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="1" />
      <stop offset="100%" stop-color="#00AA33" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="800" height="180" fill="url(#grid)" />

  <!-- Glowing name -->
  <text x="50%" y="55%" font-size="64" font-family="Fira Code, monospace"
        text-anchor="middle" fill="url(#glow)" stroke="#00FF41" stroke-width="1">
    Christian_
  </text>

  <!-- Cursor blink animation -->
  <text x="58%" y="55%" font-size="64" font-family="Fira Code, monospace"
        fill="#00FF41">
    <tspan id="cursor">|</tspan>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </text>

  <!-- Scanline animation -->
  <rect x="0" y="-180" width="800" height="180" fill="rgba(0,255,65,0.15)">
    <animate attributeName="y" from="-180" to="180" dur="3s" repeatCount="indefinite" />
  </rect>

  <!-- Subtext -->
  <text x="50%" y="80%" font-size="18" font-family="Fira Code, monospace"
        text-anchor="middle" fill="#00FF41" opacity="0.8">
    > Coding in progress..._access granted 💻
  </text>
</svg>
